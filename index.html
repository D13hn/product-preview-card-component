<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Frontend Mentor | Product preview card component</title>

</head>

<body>
        
	<main class="card">
		<picture>
			<source media="(min-width: 700px)" srcset="image-product-desktop.jpg">

			<img src="image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
		</picture>
		<div class="card-content">
			<p class="p-1">PERFUME</p>
			<h1>Gabrielle Essence Eau De Parfum</h1>
			<p class="p-2">A floral, solar and voluptuous interpretation composed by Olivier Polge,
					Perfumer-Creator for the House of CHANEL.
			</p>
			<div class="price">
				<div class="price-now">
					<p>$149.99</p>	
				</div>
				<div class="price-befor">
					<p><del>$169.99</del></p>
				</div>
				
			</div>
			<button class="cart" type="submit">
				<i class="fa-solid fa-cart-shopping"></i>
				<span>Add to Cart</span>
			</button>
			
		</div>
	</main>
	<footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/D13hn" target="_blank">HUSSEIN Alaa</a>.
  </footer>
</body>

</html>
